[platformio]
build_dir = C:/Users/merli/.platformio/build_esp32c6_crypto_monitor
default_envs = esp32-c6-devkitc-1

[env:esp32-c6-devkitc-1]
; Use the community-supported platform that enables Arduino for C6
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

board_upload.flash_size = 4MB
board_build.partitions = no_ota_2mb.csv

; These flags are often required for C6 boards to enable Serial output via USB
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -I include ; Ensures lv_conf.h is found

monitor_speed = 115200

lib_deps =
    lvgl/lvgl @ ^9.2.2
    moononournation/GFX Library for Arduino @ ^1.5.9
    adafruit/Adafruit NeoPixel @ ^1.12.3
    knolleary/PubSubClient @ ^2.8

[env:esp32-c6-devkitc-1-debug]
extends = env:esp32-c6-devkitc-1

; Use the ESP32-C6 built-in USB Serial/JTAG interface for PlatformIO debugging
debug_tool = esp-builtin
build_type = debug